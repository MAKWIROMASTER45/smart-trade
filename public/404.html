<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-404 { text-align: center; padding: 80px 20px; }
        .page-404 h1 { font-size: 5rem; color: #2d3748; margin-bottom: 10px; }
        .page-404 p { color: #4a5568; margin-bottom: 24px; }
        .page-404 a { display: inline-block; padding: 12px 20px; background: #2b6cb0; color: white; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container page-404">
        <h1>404</h1>
        <p>Ukurasa huu haukupatikana. Tafadhali angalia URL au rudi kwenye ukurasa wa nyumbani.</p>
        <a href="/">Rudi kwenye nyumbani</a>
    </div>
</body>
</html>
